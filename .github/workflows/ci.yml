name: CI - Tests & SonarQube

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Récupérer tout l'historique pour que SonarQube puisse calculer
          # correctement le périmètre "new code".
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
          DATABASE_URL: 'sqlite:///:memory:'
          SECRET_KEY: 'ci-secret-key-do-not-use-in-prod'
          LDAP_SERVER: 'ldap://test'
          LDAP_DOMAIN: 'test.local'
          BASE_DN: 'dc=test,dc=local'
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term -W ignore

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    # Skip si pas de SONAR_TOKEN configuré (fork PR par exemple)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies and run tests
        env:
          FLASK_ENV: testing
          DATABASE_URL: 'sqlite:///:memory:'
          SECRET_KEY: 'ci-secret-key-do-not-use-in-prod'
          LDAP_SERVER: 'ldap://test'
          LDAP_DOMAIN: 'test.local'
          BASE_DN: 'dc=test,dc=local'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml -W ignore || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
