# Configuration SonarQube pour Transport UdM
sonar.projectKey=Transport-UdM
sonar.projectName=Transport UdM
sonar.projectVersion=2.0.0

# Sources
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.11

# Exclusions générales (analyse complète)
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/venv/**,**/static/vendor/**,**/*.min.js,**/*.min.css

# Exclusions de couverture (fichiers analysés mais hors-coverage)
# On ne couvre pas les templates HTML, JS, CSS car ils ne sont pas testés par pytest
sonar.coverage.exclusions=**/templates/**,**/static/**,**/*.html,**/*.js,**/*.css,**/migrations/**,**/__init__.py,**/config.py

# Couverture de code Python uniquement
sonar.python.coverage.reportPaths=coverage.xml

# Encodage
sonar.sourceEncoding=UTF-8
